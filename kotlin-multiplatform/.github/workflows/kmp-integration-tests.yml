name: KMP Integration Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'kotlin-multiplatform/**'
      - '.github/workflows/kmp-integration-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'kotlin-multiplatform/**'
      - '.github/workflows/kmp-integration-tests.yml'
  workflow_dispatch:
    inputs:
      test_document_id:
        description: 'Test document ID for seeded testing'
        required: false
        default: 'CI Test Document'
        type: string
      run_browserstack:
        description: 'Run tests on BrowserStack'
        required: false
        default: true
        type: boolean

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2
  GITHUB_TEST_DOC_ID: ${{ github.event.inputs.test_document_id || 'CI Test Document' }}

jobs:
  # Local unit tests for shared logic
  common-tests:
    name: Common Logic Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kotlin-multiplatform
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Run common tests
      run: ./gradlew :composeApp:testDebugUnitTest --stacktrace
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: common-test-results
        path: kotlin-multiplatform/composeApp/build/reports/tests/

  # Local Android tests with emulator
  android-local-tests:
    name: Android Local Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kotlin-multiplatform
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        
    - name: AVD cache
      uses: actions/cache@v4
      id: avd-cache
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb*
        key: avd-34
        
    - name: Create AVD and generate snapshot for caching
      if: steps.avd-cache.outputs.cache-hit != 'true'
      uses: reactivecircus/android-emulator-runner@v2
      with:
        working-directory: kotlin-multiplatform
        api-level: 34
        target: google_apis
        arch: x86_64
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: false
        script: echo "Generated AVD snapshot for caching."
        
    - name: Run Android instrumentation tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        working-directory: kotlin-multiplatform
        api-level: 34
        target: google_apis
        arch: x86_64
        force-avd-creation: false
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          ./gradlew :composeApp:connectedAndroidTest \
            -Pandroid.testInstrumentationRunnerArguments.github_test_doc_id="${GITHUB_TEST_DOC_ID}"
            
    - name: Upload Android test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: android-local-test-results
        path: kotlin-multiplatform/composeApp/build/reports/androidTests/

  # BrowserStack real device testing
  browserstack-tests:
    name: BrowserStack Real Device Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_browserstack != 'false' }}
    needs: [common-tests]
    defaults:
      run:
        working-directory: kotlin-multiplatform
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Install jq for JSON parsing
      run: sudo apt-get update && sudo apt-get install -y jq
      
    - name: Build APKs for BrowserStack
      run: |
        ./gradlew :composeApp:assembleDebug :composeApp:assembleDebugAndroidTest --stacktrace
        
    - name: Run BrowserStack tests
      env:
        BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
        BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        GITHUB_TEST_DOC_ID: ${{ env.GITHUB_TEST_DOC_ID }}
      run: |
        chmod +x browserstack-api.sh
        ./browserstack-api.sh
        
    - name: Upload BrowserStack artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: browserstack-results
        path: |
          kotlin-multiplatform/composeApp/build/outputs/apk/debug/
          kotlin-multiplatform/browserstack-*.log

  # iOS local tests (macOS runner)
  ios-local-tests:
    name: iOS Local Tests
    runs-on: macos-latest
    defaults:
      run:
        working-directory: kotlin-multiplatform
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: List available iOS simulators
      run: xcrun simctl list devices | head -20
      
    - name: Run iOS simulator tests
      env:
        GITHUB_TEST_DOC_ID: ${{ env.GITHUB_TEST_DOC_ID }}
      run: |
        ./gradlew :composeApp:iosSimulatorArm64Test --stacktrace
        
    - name: Upload iOS test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ios-test-results
        path: kotlin-multiplatform/composeApp/build/reports/tests/iosSimulatorArm64Test/

  # Desktop tests
  desktop-tests:
    name: Desktop Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kotlin-multiplatform
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Run desktop tests
      env:
        GITHUB_TEST_DOC_ID: ${{ env.GITHUB_TEST_DOC_ID }}
      run: |
        ./gradlew :composeApp:desktopTest --stacktrace
        
    - name: Upload desktop test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: desktop-test-results
        path: kotlin-multiplatform/composeApp/build/reports/tests/desktopTest/

  # Collect and report results
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [common-tests, android-local-tests, browserstack-tests, ios-local-tests, desktop-tests]
    if: always()
    
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      
    - name: Create test summary
      run: |
        echo "# KMP Integration Test Summary" > test-summary.md
        echo "" >> test-summary.md
        echo "## Test Environment" >> test-summary.md
        echo "- **Test Document ID**: \`${{ env.GITHUB_TEST_DOC_ID }}\`" >> test-summary.md
        echo "- **Trigger**: ${{ github.event_name }}" >> test-summary.md
        echo "- **Branch**: ${{ github.ref_name }}" >> test-summary.md
        echo "- **Commit**: ${{ github.sha }}" >> test-summary.md
        echo "" >> test-summary.md
        
        echo "## Test Results" >> test-summary.md
        echo "" >> test-summary.md
        
        # Check job statuses and create summary
        echo "| Platform | Status | Details |" >> test-summary.md
        echo "|----------|--------|---------|" >> test-summary.md
        
        # Add results based on artifacts present
        if [ -d "common-test-results" ]; then
          echo "| Common Logic | ✅ Passed | Unit tests for shared KMP code |" >> test-summary.md
        else
          echo "| Common Logic | ❌ Failed | Unit tests for shared KMP code |" >> test-summary.md
        fi
        
        if [ -d "android-local-test-results" ]; then
          echo "| Android Local | ✅ Passed | Espresso tests on emulator |" >> test-summary.md
        else
          echo "| Android Local | ❌ Failed | Espresso tests on emulator |" >> test-summary.md
        fi
        
        if [ -d "browserstack-results" ]; then
          echo "| BrowserStack | ✅ Passed | Real device testing |" >> test-summary.md
        else
          echo "| BrowserStack | ❌ Failed/Skipped | Real device testing |" >> test-summary.md
        fi
        
        if [ -d "ios-test-results" ]; then
          echo "| iOS Local | ✅ Passed | Simulator testing |" >> test-summary.md
        else
          echo "| iOS Local | ❌ Failed | Simulator testing |" >> test-summary.md
        fi
        
        if [ -d "desktop-test-results" ]; then
          echo "| Desktop | ✅ Passed | JVM target testing |" >> test-summary.md
        else
          echo "| Desktop | ❌ Failed | JVM target testing |" >> test-summary.md
        fi
        
        echo "" >> test-summary.md
        echo "## Artifacts" >> test-summary.md
        echo "- Test reports and logs are available in the workflow artifacts" >> test-summary.md
        echo "- BrowserStack results: Check dashboard for detailed device reports" >> test-summary.md
        
        cat test-summary.md
        
    - name: Upload test summary
      uses: actions/upload-artifact@v4
      with:
        name: test-summary
        path: test-summary.md